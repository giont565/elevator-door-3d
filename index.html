<style>
  :root{
    --bg:#0e1318; --panel:#161d25; --card:#1c2530; --line:#2a3645;
    --txt:#dce6f0; --dim:#8fa3b8; --accent:#39c5ff; --ok:#37d67a; --warn:#ffb02e; --bad:#ff5252;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--bg);color:var(--txt);
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100%}
  header{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);
    border-bottom:1px solid var(--line);flex-wrap:wrap}
  header h1{font-size:17px;font-weight:700;letter-spacing:.5px}
  header h1 span{color:var(--accent)}
  .ctrl{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  button,a.btn{background:var(--card);color:var(--txt);border:1px solid var(--line);border-radius:8px;
    padding:6px 12px;font-size:13px;cursor:pointer;transition:.15s;text-decoration:none;display:inline-block}
  button:hover,a.btn:hover{border-color:var(--accent);color:var(--accent)}
  button.primary{background:var(--accent);color:#06222e;border-color:var(--accent);font-weight:700}
  button.on{background:#11445c;border-color:var(--accent);color:var(--accent)}
  main{flex:1;display:flex;min-height:0}
  #viewport{flex:1;position:relative;min-width:0}
  #viewport canvas{display:block}
  #stepChip{position:absolute;top:12px;left:12px;background:rgba(14,19,24,.85);border:1px solid var(--accent);
    border-radius:10px;padding:8px 14px;backdrop-filter:blur(4px);max-width:420px}
  #stepChip .no{color:var(--accent);font-weight:800;font-size:13px}
  #stepChip .ti{font-size:16px;font-weight:700;margin-top:2px}
  #timerChip{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:none;

  #timerChip .v{font-size:22px;font-weight:800;color:var(--ok);font-variant-numeric:tabular-nums}
  #timerChip .l{font-size:11px;color:var(--dim)}
  #banner{position:absolute;top:34%;left:50%;transform:translate(-50%,-50%) scale(.9);opacity:0;
    background:rgba(13,44,26,.92);border:2px solid var(--ok);border-radius:14px;padding:16px 30px;
    font-size:22px;font-weight:800;color:var(--ok);transition:.35s;pointer-events:none;text-align:center;white-space:nowrap}
  #banner.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  #signals{position:absolute;left:12px;bottom:12px;display:flex;gap:8px;flex-wrap:wrap;max-width:calc(100% - 240px)}
  .sig{background:rgba(14,19,24,.85);border:1px solid var(--line);border-radius:8px;padding:5px 10px;
    font-size:12px;display:flex;align-items:center;gap:6px;backdrop-filter:blur(4px)}
  .sig i{width:10px;height:10px;border-radius:50%;background:#3a4a5a;display:inline-block;flex:none}
  .sig.on i{background:var(--ok);box-shadow:0 0 8px var(--ok)}
  .sig.bad i{background:var(--bad);box-shadow:0 0 8px var(--bad)}
  .sig.warn i{background:var(--warn);box-shadow:0 0 8px var(--warn)}
  #speedBox{position:absolute;right:12px;bottom:12px;background:rgba(14,19,24,.85);border:1px solid var(--line);
    border-radius:10px;padding:8px 10px 6px;backdrop-filter:blur(4px)}
  #speedBox .l{font-size:11px;color:var(--dim);margin-bottom:4px}
  #loopFlash{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;transition:opacity .25s}
  aside{width:400px;flex:none;background:var(--panel);border-left:1px solid var(--line);

  #stepList{display:flex;flex-wrap:wrap;gap:5px;padding:10px 12px;border-bottom:1px solid var(--line)}

  .field .k::before{content:"";width:8px;height:8px;border-radius:2px;display:inline-block}
  .field.trig .k{color:var(--warn)} .field.trig .k::before{background:var(--warn)}
  .field.mech .k{color:#c792ea} .field.mech .k::before{background:#c792ea}
  .field.next .k{color:var(--ok)} .field.next .k::before{background:var(--ok)}
  .field .v{font-size:13.5px;line-height:1.75;color:var(--txt)}

    font-weight:700;white-space:nowrap;pointer-events:none;border:1px solid rgba(0,0,0,.25)}
  @media (max-width:980px){ aside{width:330px} }
</style>

<div id="app">
  <header>
    <h1>🛗 電梯門機構 <span>3D 判定鏈教學（現場照片校正版）</span></h1>

<script type="importmap">
{ "imports": {

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

/* ============ 時間軸 ============ */
const T_TOTAL = 16.5;
const ei  = t => t*t;
const eo  = t => 1-(1-t)*(1-t);
const eio = t => t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
const seg = (t,a,b) => Math.min(1, Math.max(0,(t-a)/(b-a)));

let safetyMode='curtain';   // 'curtain'=光幕（新式） / 'edge'=機械安全門邊（舊式）
function dOf(t){
  if(safetyMode==='edge'){
    // 機械式：門要一路關到「真的碰到貨物」、門邊條被壓縮到底，開關才作動 → 反轉
    if (t < 2.15)  return 1 - 0.60*ei(seg(t,0,2.15));
    if (t < 2.45)  return 0.40 - 0.12*eo(seg(t,2.15,2.45));
    if (t < 3.00)  return 0.28;
    if (t < 5.00)  return 0.28 + 0.72*eio(seg(t,3.0,5.0));
  }else{
    if (t < 2.15)  return 1 - 0.45*ei(seg(t,0,2.15));
    if (t < 2.50)  return 0.55 - 0.035*eo(seg(t,2.15,2.50));
    if (t < 3.00)  return 0.515;
    if (t < 5.00)  return 0.515 + 0.485*eio(seg(t,3.0,5.0));
  }
  if (t < 8.80)  return 1;
  if (t < 9.60)  return 1 - 0.06*ei(seg(t,8.8,9.6));
  if (t < 12.40) return 0.94 - 0.88*eio(seg(t,9.6,12.4));
  if (t < 12.85) return 0.06 - 0.06*eo(seg(t,12.4,12.85));
  return 0;
}
/* 門邊條壓縮量（0~1）：門邊外凸 12mm，貨物在門口時被門壓回 */
const comp01 = d => Math.min(1, Math.max(0, (0.3067 - d) / 0.0267));
function vaneClamp(t){
  if (t < 12.90) return 1;
  if (t < 13.50) return 1 - eio(seg(t,12.9,13.5));
  return 0;
}
function hookOpen(t){
  if (t < 13.55) return 1;
  if (t < 14.05) return 1 - eo(seg(t,13.55,14.05));
  return 0;
}
function boxZ(t){
  const hold = safetyMode==='edge' ? -0.02 : -0.15;  // 機械式：貨物站在門縫線上才會被門邊碰到
  if (t < 1.0)  return -1.5;
  if (t < 2.15) return -1.5 + (hold+1.5)*eio(seg(t,1.0,2.15));
  if (t < 4.6)  return hold;
  if (t < 6.2)  return hold + (1.1-hold)*eio(seg(t,4.6,6.2));
  return 1.1;
}
const curtainBlocked = t => Math.abs(boxZ(t)) < 0.27 && dOf(t) > 0.12;
const edgePressed = t => safetyMode==='edge' && Math.abs(boxZ(t)) < 0.16 && comp01(dOf(t)) > 0.8;
const sig = t => ({
  sde  : safetyMode==='edge' ? !edgePressed(t) : !curtainBlocked(t),
  olt  : dOf(t) > 0.995,
  clt  : dOf(t) < 0.005 && t > 12.5,
  vane : vaneClamp(t) > 0.5,
  gs   : dOf(t) < 0.005 && t > 12.5,
  ds   : t >= 14.15,
});

/* ============ 步驟 ============ */
const STEPS = [
{t0:0, t1:2.15, no:'S0', short:'關門中', title:'S0 關門中',
 trig:'收到關門指令，馬達開始轉。',
 mech:'馬達驅動齒型帶 → 上下兩股各拉一扇門（永遠等速對開對關）→ 滑輪沿導軌滾動 → <b>門刀</b>夾著廳門的<b>開鎖滾輪</b>，把廳門一起帶著關。',
 next:'光幕被擋 → S1 重開門；沒擋 → 直接到 S7。',
 nextE:'門邊真的碰到障礙物 → S1 重開門；沒碰到 → 直接到 S7。',
 focus:['beams','motor','belt']},
{t0:2.15, t1:3.0, no:'S1', short:'光幕遮斷', title:'S1 光幕遮斷',
 titleE:'S1 安全門邊壓到障礙物',
 trig:'貨物擋住任一束紅外線 → 光幕訊號斷（光束變紅）。<b>還沒碰到就反轉</b>——這是光幕的優點。',
 trigE:'門一路關到<b>真的碰到貨物</b> → 門邊條被往內壓 12mm → 連桿拉動開關作動。機械式一定要「碰到」才知道——人進出太慢就會被夾到，這就是它的缺點（也是後來換成光幕的原因）。',
 mech:'皮帶<b>先煞停、再反轉</b>——不是瞬間反彈，避免機構衝擊。',
 mechE:'門邊條內縮 → 開關作動 → 皮帶煞停再反轉。注意看門關得比光幕模式更深、真的頂到貨物才回頭。',
 next:'反轉開始 → S2。',
 focus:['beams','curtain']},
{t0:3.0, t1:5.0, no:'S2', short:'重開門', title:'S2 重開門',
 trig:'馬達反轉。',
 mech:'兩扇門對開；門刀仍夾著開鎖滾輪、廳門跟著開；<b>鎖鉤維持被頂開</b>；自閉重錘被拉高（儲存關門的力量）。',
 next:'門走到全開位置 → S3。',
 focus:['motor','belt','vane']},
{t0:5.0, t1:5.8, no:'S3', short:'開門到位', title:'S3 開門到位',
 trig:'<b>開門到位</b>訊號作動（編碼器位置判定，燈亮）。',
 mech:'門停在全開，馬達只留一點保持力，防止門被手扒回去。',
 next:'啟動開門等待計時。',
 focus:['openLim']},
{t0:5.8, t1:8.8, no:'S4', short:'等待計時', title:'S4 開門等待',
 trig:'計時倒數；<b>光幕再被擋一次就歸零重數</b>（所以一直有人進出門不會關）。',
 trigE:'計時倒數。注意：<b>機械門邊看不到人</b>——有人通過也不會重數，時間到照關（光幕才有「看到人就重數」的功能）。',
 mech:'門保持全開；貨物通過門口進到車廂內。',
 next:'計時到 0 且光幕導通 → S5。',
 nextE:'計時到 0 → S5（不檢查門口有沒有人——舊式的風險點）。',
 focus:['beams','curtain']},
{t0:8.8, t1:9.6, no:'S5', short:'關門啟動', title:'S5 關門啟動',
 trig:'等待條件成立，重新下關門指令。',
 mech:'皮帶<b>低速起步</b>——門剛合攏時最容易夾人，這段全程最慢。',
 next:'起步段走完 → S6。',
 focus:['motor']},
{t0:9.6, t1:12.4, no:'S6', short:'關門行程', title:'S6 關門行程（S 曲線）',
 trig:'編碼器位置決定減速點：離全關剩一小段就提前減速。',
 mech:'加速 → 等速 → 提前減速 → 低速爬行（看右下角速度錶 ▲）；門刀帶著廳門一起關。',
 next:'進入低速爬行 → 等關門到位。',
 focus:['belt','motor']},
{t0:12.4, t1:13.6, no:'S7', short:'到位+門刀釋放', title:'S7 關門到位＋門刀釋放',
 trig:'<b>關門到位</b>訊號作動（燈亮）。',
 mech:'<b>門刀兩片刀片向內收攏 → 放開開鎖滾輪</b> → 車門與廳門脫鉤。建議切「門刀／門鎖特寫」鏡頭看。',
 next:'鎖鉤失去支撐 → S8。',
 focus:['vane','closeLim']},
{t0:13.6, t1:14.6, no:'S8', short:'門鎖勾合', title:'S8 門鎖勾合',
 trig:'門刀放開滾輪。',
 mech:'<b>廳門鎖鉤</b>靠彈簧＋自重落下、鉤喙咬住鎖座滾輪銷；鉤尾接點橋同時碰上兩片彈片 → <b>廳門鎖接點導通</b>（綠燈亮）。同時車門全閉、撞塊壓上<b>轎門鎖接點</b>。',
 next:'鉤到底＋接點導通 → S9。',
 focus:['hook','contacts','gsSw']},
{t0:14.6, t1:16.5, no:'S9', short:'鎖閉完成', title:'S9 鎖閉完成',
 trig:'機械勾到底＋電氣接點導通，雙重確認都成立。',
 mech:'廳門被機械鎖死（在外面扒不開）、車門全閉——門機構完成一輪開關門。',
 next:'下一站到站再從開門開始（動畫自動重播）。',
 focus:['contacts','hook','gsSw']},
];

/* ============ 場景 ============ */
const vp = document.getElementById('viewport');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e1318);
scene.fog = new THREE.Fog(0x0e1318, 7, 16);

const camera = new THREE.PerspectiveCamera(46, 1, 0.05, 50);
camera.position.set(0.4, 1.9, 4.4);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
vp.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.domElement.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none';
vp.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.5, 0);
controls.enableDamping = true; controls.dampingFactor = .08;
controls.maxDistance = 10; controls.minDistance = .4;

scene.add(new THREE.HemisphereLight(0xbfd4e8, 0x202830, 1.2));
const key = new THREE.DirectionalLight(0xffffff, 2.2);
key.position.set(3, 5, 4); key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left=-3; key.shadow.camera.right=3;
key.shadow.camera.top=4;  key.shadow.camera.bottom=-1;
scene.add(key);
const fill = new THREE.DirectionalLight(0x88bbff, 0.8);
fill.position.set(-3, 3, -3); scene.add(fill);
const pFront = new THREE.PointLight(0xfff2dd, 22, 7); pFront.position.set(0, 2.5, 1.8); scene.add(pFront);
const pHall  = new THREE.PointLight(0xcfe2ff, 14, 6); pHall.position.set(-0.3, 2.3, -1.4); scene.add(pHall);

const M = {
  steel  : new THREE.MeshStandardMaterial({color:0xa8b5c2, metalness:.7, roughness:.38}),
  dark   : new THREE.MeshStandardMaterial({color:0x4d5a68, metalness:.55, roughness:.5}),
  frame  : new THREE.MeshStandardMaterial({color:0x2e3a47, metalness:.4,  roughness:.7}),
  motor  : new THREE.MeshStandardMaterial({color:0x3f6f9e, metalness:.55, roughness:.42}),
  oldmtr : new THREE.MeshStandardMaterial({color:0x32383f, metalness:.5,  roughness:.5}),
  belt   : new THREE.MeshStandardMaterial({color:0x14181c, roughness:.92}),
  tooth  : new THREE.MeshStandardMaterial({color:0x3c444c, roughness:.8}),
  cable  : new THREE.MeshStandardMaterial({color:0x191919, roughness:.9}),
  pulley : new THREE.MeshStandardMaterial({color:0xc8d2dc, metalness:.85, roughness:.3}),
  pu     : new THREE.MeshStandardMaterial({color:0xeef2f5, metalness:.05, roughness:.5}),
  nylon  : new THREE.MeshStandardMaterial({color:0xb9bdc2, metalness:.0,  roughness:.7}),
  safe   : new THREE.MeshStandardMaterial({color:0xf2b824, metalness:.3,  roughness:.55}),
  estop  : new THREE.MeshStandardMaterial({color:0xc4332e, metalness:.3,  roughness:.5}),
  panel  : new THREE.MeshPhysicalMaterial({color:0xb9c4cf, metalness:.85, roughness:.3, transparent:true, opacity:.34}),
  landing: new THREE.MeshPhysicalMaterial({color:0x8d99a6, metalness:.85, roughness:.35, transparent:true, opacity:.30}),
  plateX : new THREE.MeshStandardMaterial({color:0x9ba3a8, metalness:.6, roughness:.45, transparent:true, opacity:.30, side:THREE.DoubleSide}),
  hangerX: new THREE.MeshStandardMaterial({color:0xa9b4c2, metalness:.7, roughness:.38, transparent:true, opacity:.38, side:THREE.DoubleSide}),
  vane   : new THREE.MeshStandardMaterial({color:0xffb02e, metalness:.6,  roughness:.4}),
  hook   : new THREE.MeshStandardMaterial({color:0xd64545, metalness:.6,  roughness:.4}),
  copper : new THREE.MeshStandardMaterial({color:0xd98a3a, metalness:.9,  roughness:.3}),

  alu    : new THREE.MeshStandardMaterial({color:0x8e99a4, metalness:.8,  roughness:.35}),

};
const B = (w,h,d,m)=>{const x=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);x.castShadow=x.receiveShadow=true;return x};
const CYL=(r,len,m,seg2=28)=>{const g=new THREE.CylinderGeometry(r,r,len,seg2);g.rotateX(Math.PI/2);
  const x=new THREE.Mesh(g,m);x.castShadow=x.receiveShadow=true;return x};
const HEX=(r,h,m=M.steel)=>{const g=new THREE.CylinderGeometry(r,r,h,6);g.rotateX(Math.PI/2);
  const x=new THREE.Mesh(g,m);x.castShadow=true;return x};
function extrude(shapePts, depth, m, holes){
  const s=new THREE.Shape();
  shapePts.forEach((p,i)=> i? s.lineTo(p[0],p[1]) : s.moveTo(p[0],p[1]));
  s.closePath();
  if(holes) for(const h of holes){ const p=new THREE.Path(); p.absarc(h[0],h[1],h[2],0,Math.PI*2,true); s.holes.push(p); }
  const geo=new THREE.ExtrudeGeometry(s,{depth,bevelEnabled:false});
  const mesh=new THREE.Mesh(geo,m); mesh.castShadow=mesh.receiveShadow=true; return mesh;
}

let curFocusMats = [];
function setFocus(keys){
  for(const m of curFocusMats){ m.emissive.setHex(m.userData._em??0); m.emissiveIntensity=1; }
  curFocusMats = [];
  const seen = new Set();
  const eff = safetyMode==='edge' ? keys.map(k=>(k==='beams'||k==='curtain')?'edge':k) : keys;
  for(const k of eff) for(const mesh of (FOCUS[k]||[])){
    const m = mesh.material;
    if(seen.has(m.uuid)) continue; seen.add(m.uuid);
    if(m.userData._em===undefined) m.userData._em = m.emissive ? m.emissive.getHex() : 0;
    curFocusMats.push(m);
  }
}

const stepTitle = s => (safetyMode==='edge' && s.titleE) ? s.titleE : s.title;

    <div class="field next"><div class="k">進入下一步的條件</div><div class="v">${next}</div></div>
    <div class="note">機型：永磁直驅＋同步帶門機。本版已依現場照片校正：寬幅齒帶＋大型皮帶夾、
    直立散熱鰭驅動箱、鍍鋅鈑金機座、黃色車頂護欄。上方兩顆切換鈕：「驅動」＝新式直驅 ⇄ 舊式減速輪＋V帶；
    「防夾」＝新式光幕（沒碰到就反轉）⇄ 舊式機械門邊（要碰到才反轉，依更新前後照片）。
    門板 X-ray 半透明為透視用；滑鼠拖曳旋轉、滾輪縮放。</div>`;
}

/* 速度曲線小圖 */
const spCv=document.getElementById('speedCv'), spCtx=spCv.getContext('2d');
const SAMPLES=[];
function buildSamples(){
  SAMPLES.length=0; let vmax=0;
  for(let i=0;i<=330;i++){ const t=i/330*T_TOTAL;
    const v=Math.abs(dOf(t+.016)-dOf(t-.016))/.032; SAMPLES.push(v); vmax=Math.max(vmax,v); }
  for(let i=0;i<SAMPLES.length;i++) SAMPLES[i]/=vmax;
}
buildSamples();
function drawSpeed(t){
  const w=spCv.width,h=spCv.height;
  spCtx.clearRect(0,0,w,h);
  spCtx.strokeStyle='#2a3645'; spCtx.beginPath(); spCtx.moveTo(0,h-8); spCtx.lineTo(w,h-8); spCtx.stroke();
  spCtx.strokeStyle='#39c5ff'; spCtx.lineWidth=1.5; spCtx.beginPath();
  SAMPLES.forEach((v,i)=>{ const x=i/(SAMPLES.length-1)*w, y=h-8-v*(h-16);
    i?spCtx.lineTo(x,y):spCtx.moveTo(x,y); });
  spCtx.stroke();
  const cx=t/T_TOTAL*w;
  spCtx.fillStyle='#ffb02e'; spCtx.beginPath();
  spCtx.moveTo(cx,h-2); spCtx.lineTo(cx-4,h+4-2); spCtx.lineTo(cx+4,h+4-2); spCtx.closePath(); spCtx.fill();
  spCtx.fillRect(cx-.75,8,1.5,h-16);
}

/* ============ 主迴圈 ============ */
let T=0, playing=true, speedIdx=1; const SPEEDS=[.5,1,2];
let curStep=-1;
const clock=new THREE.Clock();

function stepOf(t){ for(let i=STEPS.length-1;i>=0;i--) if(t>=STEPS[i].t0) return i; return 0; }
function forceStep(){ curStep=-1; }

ui.play.onclick=()=>{ playing=!playing; ui.play.textContent=playing?'⏸ 暫停':'▶ 播放'; };
ui.prev.onclick=()=>{ const i=stepOf(T);
  const target=(T-STEPS[i].t0<.3)?Math.max(0,i-1):i;
  T=STEPS[target].t0+0.01; forceStep(); };
ui.next.onclick=()=>{ const i=stepOf(T); T=STEPS[Math.min(STEPS.length-1,i+1)].t0+0.01; forceStep(); };
ui.speed.onclick=()=>{ speedIdx=(speedIdx+1)%SPEEDS.length; ui.speed.textContent=`速度 ${SPEEDS[speedIdx]}×`; };
const XRAY_MATS=[[M.panel,.34],[M.landing,.30],[M.plateX,.30],[M.hangerX,.38]];
ui.xray.onclick=()=>{
  const solid = M.panel.opacity<.9;
  for(const [m,op] of XRAY_MATS){
    m.opacity=solid?1:op; m.transparent=!solid; m.needsUpdate=true;
  }
  ui.xray.classList.toggle('on',!solid);
};
let labelsOn=true;
function syncDriveVis(){
  mtrLbl.visible = encLbl.visible = labelsOn && motorG.visible;
  rimLbl.visible = labelsOn && redG.visible;
  powerCable.visible = motorG.visible;
}
ui.label.onclick=()=>{
  labelsOn=!labelsOn; labels.forEach(l=>l.visible=labelsOn);
  ui.label.classList.toggle('on',labelsOn);
  syncDriveVis(); syncSafetyVis();
};
ui.drive.onclick=()=>{
  const old=!redG.visible;
  redG.visible=old;
  motorG.visible=!old; motorBracket.visible=!old;
  ui.drive.textContent = old ? '驅動：減速輪＋V帶（舊式）' : '驅動：直驅（新式）';
  ui.drive.classList.toggle('on', old);
  syncDriveVis();
};
syncDriveVis();
/* 防夾裝置切換：光幕（新式）⇄ 機械門邊（舊式） */
const btnSafety=document.getElementById('btnSafety');
function syncSafetyVis(){
  const e = safetyMode==='edge';
  for(const h of [hL,hR]){
    h.strip.visible=!e; h.dots.forEach(dt=>dt.visible=!e);
    h.me.visible=e;
  }
  curtainLbl.visible = labelsOn && !e;
  edgeLbl.visible    = labelsOn && e;
}
btnSafety.onclick=()=>{
  safetyMode = safetyMode==='edge' ? 'curtain' : 'edge';
  const e = safetyMode==='edge';
  btnSafety.textContent = e ? '防夾：機械門邊（舊式）' : '防夾：光幕（新式）';
  btnSafety.classList.toggle('on', e);
  syncSafetyVis(); buildSamples(); forceStep();
};
syncSafetyVis();
const CAMS={
  camAll    :{p:[0.4,1.9,4.4],  t:[0,1.5,0]},
  camMachine:{p:[0.2,2.62,2.6], t:[0,2.44,0]},
  camLock   :{p:[-1.1,2.6,0.95], t:[-0.2,2.28,-.25]},
  camSide   :{p:[2.5,2.3,1.55], t:[0,1.85,-0.1]},
};
for(const id in CAMS){
  document.getElementById(id).onclick=()=>{
    camera.position.set(...CAMS[id].p); controls.target.set(...CAMS[id].t);
    document.querySelectorAll('#camAll,#camMachine,#camLock,#camSide').forEach(b=>b.classList.remove('on'));
    document.getElementById(id).classList.add('on');
  };

function resize(){
  const w=vp.clientWidth,h=vp.clientHeight;
  camera.aspect=w/h; camera.updateProjectionMatrix();
  renderer.setSize(w,h); labelRenderer.setSize(w,h);
}
addEventListener('resize',resize); resize();

function update(){
  const t=T;
  const d=dOf(t), clamp=vaneClamp(t), hOpen=hookOpen(t);
  const xl=-(PANEL_W/2)-TRAVEL*d, xr=(PANEL_W/2)+TRAVEL*d;

  hL.g.position.x=xl; hR.g.position.x=xr;
  lL.g.position.x=xl; lR.g.position.x=xr;

  const beltDisp=TRAVEL*d;
  const wrap=((beltDisp%PITCH)+PITCH)%PITCH;
  teethUp.position.x= wrap; teethDn.position.x=-wrap;
  drivePul.rotation.z=idlePul.rotation.z=-beltDisp/.06;
  if(redG.visible){
    bigWheel.rotation.z=-beltDisp/.06;
    smallPul.rotation.z=-beltDisp/.06*(0.15/0.035);
  }
  for(const r of hL.rollers) r.rotation.z= (TRAVEL*d)/.048;
  for(const r of hR.rollers) r.rotation.z=-(TRAVEL*d)/.048;
  for(const r of lL.rollers) r.rotation.z= (TRAVEL*d)/.042;
  for(const r of lR.rollers) r.rotation.z=-(TRAVEL*d)/.042;

  bladeL.position.x=-(.024+.008*clamp)-.006;
  bladeR.position.x= (.024+.008*clamp)+.006;
  linkL.rotation.z= .3+.25*(1-clamp);
  linkR.rotation.z=-.3-.25*(1-clamp);

  hookG.rotation.z=.62*hOpen;
  const S=sig(t);
  lockLED.material.emissive.setHex(S.ds?0x16c95e:0x000000);
  lockLED.material.emissiveIntensity=S.ds?1.8:0;

  swOpen.lever.rotation.z = d>.985 ? -1.1*seg(d,.985,1) : 0;
  swClose.lever.rotation.z= d<.03  ?  1.1*(1-seg(d,0,.03)) : 0;

  const wy = 1.42 + 0.42*d;
  cwWeight.position.y = wy;
  const rp = ropeGeo.attributes.position.array;
  rp[0]=xl+0.2; rp[1]=2.27; rp[2]=-.30;
  rp[3]=.62;   rp[4]=2.178; rp[5]=-.30;
  rp[6]=.62;   rp[7]=wy+.065; rp[8]=-.30;
  ropeGeo.attributes.position.needsUpdate=true;

  const eMode = safetyMode==='edge';
  /* 機械門邊：貨物在門口且門關到頂住 → 門邊條被壓回 */
  const comp = (eMode && Math.abs(boxZ(t))<0.16) ? comp01(d) : 0;
  hL.mstrip.position.x = hL.mBaseX + comp*0.012;
  hR.mstrip.position.x = hR.mBaseX - comp*0.012;

  const blocked=curtainBlocked(t);
  const gapL=xl+PANEL_W/2-.015, gapR=xr-PANEL_W/2+.015;
  const showBeams=(gapR-gapL)>.07 && !eMode;
  beams.visible=showBeams;
  if(showBeams){
    const pos=beamGeo.attributes.position.array;
    for(let i=0;i<NBEAM;i++){
      const y=.18+i*(1.72/(NBEAM-1));
      pos[i*6+0]=gapL; pos[i*6+1]=y; pos[i*6+2]=.03;
      pos[i*6+3]=gapR; pos[i*6+4]=y; pos[i*6+5]=.03;
    }
    beamGeo.attributes.position.needsUpdate=true;
    beamMat.color.setHex(blocked?0xff5252:0x37d67a);
    beamMat.opacity=blocked?1:.55;
  }
  M.curtain.emissive.setHex(blocked?0x551111:0x07301c);
  M.lens.emissive.setHex(blocked?0xff5252:0x16c95e);

  cart.position.set(0,0,boxZ(t));

  ui.sigs.sde.className = 'sig '+(S.sde?'on':'bad');
  ui.sigs.sde.innerHTML = eMode
    ? `<i></i>安全門邊${S.sde?'待命':'作動！（碰到了）'}`
    : `<i></i>光幕${S.sde?'導通':'遮斷！'}`;
  ui.sigs.olt.className = 'sig '+(S.olt?'on':'');
  ui.sigs.clt.className = 'sig '+(S.clt?'on':'');
  ui.sigs.vane.className= 'sig '+(S.vane?'warn':'on');
  ui.sigs.vane.innerHTML= `<i></i>${S.vane?'門刀夾持中（車廳門連動）':'門刀已釋放'}`;
  ui.sigs.gs.className  = 'sig '+(S.gs?'on':'');
  ui.sigs.ds.className  = 'sig '+(S.ds?'on':'');

  if(t>=5.8&&t<8.8){ ui.timer.style.display='block'; ui.timerV.textContent=(8.8-t).toFixed(1)+' s'; }
  else ui.timer.style.display='none';
  ui.banner.classList.toggle('show', t>=15.0);

  const si=stepOf(t);
  if(si!==curStep){
    curStep=si; const s=STEPS[si];
    ui.chipNo.textContent=`STEP ${si+1} / ${STEPS.length} ・ t=${s.t0.toFixed(1)}s`;
    ui.chipTi.textContent=stepTitle(s);
    [...ui.list.children].forEach((b,i)=>b.classList.toggle('act',i===si));
    renderDetail(s); setFocus(s.focus);
  }
  const pulse=(Math.sin(performance.now()/240)+1)/2;
  for(const m of curFocusMats){ m.emissive.setHex(0x1a6fa0); m.emissiveIntensity=.25+.75*pulse; }

  drawSpeed(t);
}

let flashT=0;
function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),.1);
  if(playing){
    T+=dt*SPEEDS[speedIdx];
    if(T>=T_TOTAL){ T=0; forceStep(); flashT=.5; }
  }
  if(flashT>0){ flashT-=dt; ui.flash.style.opacity=Math.min(.8,flashT*2); }
  update();
  controls.update();
  renderer.render(scene,camera);
  labelRenderer.render(scene,camera);
}
renderDetail(STEPS[0]);
loop();

/* 測試掛勾 */
window.__setT=v=>{T=v;forceStep();update();};
window.__pause=()=>{playing=false;ui.play.textContent='▶ 播放';};
window.__state=()=>({T,d:dOf(T),step:stepOf(T),sig:sig(T)});
window.__setCam=(p,t)=>{camera.position.set(...p);controls.target.set(...t);};
window.__world=o=>{const v=new THREE.Vector3();({hook:hookBody,keeper,bridge,pin1:cPin1,blade:bladeLMesh,roller:cR1,gscam:gsCam,gssw:gsBody}[o]).getWorldPosition(v);return v.toArray();};
window.__drive=()=>ui.drive.click();
window.__safety=()=>btnSafety.click();
