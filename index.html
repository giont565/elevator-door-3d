<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電梯門機構 3D 動態教學 — 重開門到關門全判定鏈</title>
<style>
  :root{
    --bg:#0e1318; --panel:#161d25; --card:#1c2530; --line:#2a3645;
    --txt:#dce6f0; --dim:#8fa3b8; --accent:#39c5ff; --ok:#37d67a; --warn:#ffb02e; --bad:#ff5252;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--bg);color:var(--txt);
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100%}
  header{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);
    border-bottom:1px solid var(--line);flex-wrap:wrap}
  header h1{font-size:17px;font-weight:700;letter-spacing:.5px}
  header h1 span{color:var(--accent)}
  .ctrl{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  button{background:var(--card);color:var(--txt);border:1px solid var(--line);border-radius:8px;
    padding:6px 12px;font-size:13px;cursor:pointer;transition:.15s}
  button:hover{border-color:var(--accent);color:var(--accent)}
  button.primary{background:var(--accent);color:#06222e;border-color:var(--accent);font-weight:700}
  button.on{background:#11445c;border-color:var(--accent);color:var(--accent)}
  main{flex:1;display:flex;min-height:0}
  #viewport{flex:1;position:relative;min-width:0}
  #viewport canvas{display:block}
  /* HUD */
  #stepChip{position:absolute;top:12px;left:12px;background:rgba(14,19,24,.85);border:1px solid var(--accent);
    border-radius:10px;padding:8px 14px;backdrop-filter:blur(4px);max-width:420px}
  #stepChip .no{color:var(--accent);font-weight:800;font-size:13px}
  #stepChip .ti{font-size:16px;font-weight:700;margin-top:2px}
  #timerChip{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:none;
    background:rgba(20,30,18,.9);border:1px solid var(--ok);border-radius:10px;padding:8px 16px;text-align:center}
  #timerChip .v{font-size:22px;font-weight:800;color:var(--ok);font-variant-numeric:tabular-nums}
  #timerChip .l{font-size:11px;color:var(--dim)}
  #banner{position:absolute;top:34%;left:50%;transform:translate(-50%,-50%) scale(.9);opacity:0;
    background:rgba(13,44,26,.92);border:2px solid var(--ok);border-radius:14px;padding:16px 30px;
    font-size:22px;font-weight:800;color:var(--ok);transition:.35s;pointer-events:none;text-align:center;white-space:nowrap}
  #banner.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  #signals{position:absolute;left:12px;bottom:12px;display:flex;gap:8px;flex-wrap:wrap;max-width:calc(100% - 240px)}
  .sig{background:rgba(14,19,24,.85);border:1px solid var(--line);border-radius:8px;padding:5px 10px;
    font-size:12px;display:flex;align-items:center;gap:6px;backdrop-filter:blur(4px)}
  .sig i{width:10px;height:10px;border-radius:50%;background:#3a4a5a;display:inline-block;flex:none}
  .sig.on i{background:var(--ok);box-shadow:0 0 8px var(--ok)}
  .sig.bad i{background:var(--bad);box-shadow:0 0 8px var(--bad)}
  .sig.warn i{background:var(--warn);box-shadow:0 0 8px var(--warn)}
  #speedBox{position:absolute;right:12px;bottom:12px;background:rgba(14,19,24,.85);border:1px solid var(--line);
    border-radius:10px;padding:8px 10px 6px;backdrop-filter:blur(4px)}
  #speedBox .l{font-size:11px;color:var(--dim);margin-bottom:4px}
  #loopFlash{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;transition:opacity .25s}
  /* Side panel */
  aside{width:400px;flex:none;background:var(--panel);border-left:1px solid var(--line);
    display:flex;flex-direction:column;min-height:0}
  #stepList{display:flex;flex-wrap:wrap;gap:5px;padding:10px 12px;border-bottom:1px solid var(--line)}
  #stepList button{padding:4px 9px;font-size:12px;border-radius:6px}
  #stepList button.act{background:var(--accent);color:#06222e;border-color:var(--accent);font-weight:700}
  #detail{flex:1;overflow-y:auto;padding:14px 16px}
  #detail h2{font-size:17px;color:var(--accent);margin-bottom:10px;line-height:1.4}
  .field{margin-bottom:12px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .field .k{font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:5px;display:flex;align-items:center;gap:6px}
  .field .k::before{content:"";width:8px;height:8px;border-radius:2px;display:inline-block}
  .field.trig .k{color:var(--warn)} .field.trig .k::before{background:var(--warn)}
  .field.ctrl .k{color:var(--accent)} .field.ctrl .k::before{background:var(--accent)}
  .field.mech .k{color:#c792ea} .field.mech .k::before{background:#c792ea}
  .field.next .k{color:var(--ok)} .field.next .k::before{background:var(--ok)}
  .field .v{font-size:13.5px;line-height:1.75;color:var(--txt)}
  #detail .note{font-size:11.5px;color:var(--dim);line-height:1.7;border-top:1px dashed var(--line);
    padding-top:10px;margin-top:14px}
  .lbl{color:#0e1318;background:rgba(220,230,240,.92);border-radius:5px;padding:1px 7px;font-size:11px;
    font-weight:700;white-space:nowrap;pointer-events:none;border:1px solid rgba(0,0,0,.25)}
  @media (max-width:980px){ aside{width:330px} }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🛗 電梯門機構 <span>3D 判定鏈動態教學</span></h1>
    <div class="ctrl">
      <button id="btnPlay" class="primary">⏸ 暫停</button>
      <button id="btnPrev">⏮ 上一步</button>
      <button id="btnNext">下一步 ⏭</button>
      <button id="btnSpeed">速度 1×</button>
      <span style="width:10px"></span>
      <button id="camAll" class="on">全景</button>
      <button id="camMachine">門機特寫</button>
      <button id="camLock">門刀／門鎖特寫</button>
      <button id="camSide">側面剖視</button>
      <span style="width:10px"></span>
      <button id="btnXray" class="on">X-ray 透視</button>
      <button id="btnLabel" class="on">零件標籤</button>
      <a href="mitsubishi.html" style="background:var(--card);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:13px;text-decoration:none;display:inline-block">🔴 三菱</a>
      <a href="fujitec.html" style="background:var(--card);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:13px;text-decoration:none;display:inline-block">🟠 富士達</a>
      <a href="kone.html" style="background:var(--card);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:13px;text-decoration:none;display:inline-block">🔵 通力</a>
    </div>
  </header>
  <main>
    <div id="viewport">
      <div id="stepChip"><div class="no">STEP</div><div class="ti">載入中…</div></div>
      <div id="timerChip"><div class="v">3.0 s</div><div class="l">開門等待計時（光幕再遮斷會歸零重數）</div></div>
      <div id="banner">✓ 門已鎖閉 — 開關門循環完成</div>
      <div id="signals">
        <div class="sig" id="sigCurtain"><i></i>光幕導通</div>
        <div class="sig" id="sigOpenLim"><i></i>開門限位</div>
        <div class="sig" id="sigCloseLim"><i></i>關門限位</div>
        <div class="sig" id="sigVane"><i></i>門刀夾持中</div>
        <div class="sig" id="sigLock"><i></i>門鎖接點</div>
      </div>
      <div id="speedBox"><div class="l">門速曲線（S 曲線）｜▲＝現在</div><canvas id="speedCv" width="216" height="64"></canvas></div>
      <div id="loopFlash"></div>
    </div>
    <aside>
      <div id="stepList"></div>
      <div id="detail"></div>
    </aside>
  </main>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

/* ============================================================
   時間軸（秒）與門位置 d：0=全關、1=全開
   ============================================================ */
const T_TOTAL = 16.5;
const ei  = t => t*t;                                   // easeIn
const eo  = t => 1-(1-t)*(1-t);                         // easeOut
const eio = t => t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; // easeInOut
const seg = (t,a,b) => Math.min(1, Math.max(0,(t-a)/(b-a)));

function dOf(t){
  if (t < 2.15)  return 1 - 0.45*ei(seg(t,0,2.15));        // S0 關門中（被打斷前）
  if (t < 2.50)  return 0.55 - 0.035*eo(seg(t,2.15,2.50)); // S1 減速煞停
  if (t < 3.00)  return 0.515;                             //    判定＋反轉切換
  if (t < 5.00)  return 0.515 + 0.485*eio(seg(t,3.0,5.0)); // S2 重開門
  if (t < 8.80)  return 1;                                 // S3+S4 全開等待
  if (t < 9.60)  return 1 - 0.06*ei(seg(t,8.8,9.6));       // S5 低速起步
  if (t < 12.40) return 0.94 - 0.88*eio(seg(t,9.6,12.4));  // S6 S曲線行程
  if (t < 12.85) return 0.06 - 0.06*eo(seg(t,12.4,12.85)); // S7 低速爬行到底
  return 0;
}
function vaneClamp(t){          // 1=門刀夾緊滾輪、0=釋放
  if (t < 12.90) return 1;
  if (t < 13.50) return 1 - eio(seg(t,12.9,13.5));
  return 0;
}
function hookOpen(t){           // 1=門鎖勾被頂開、0=勾合到底
  if (t < 13.55) return 1;
  if (t < 14.05) return 1 - eo(seg(t,13.55,14.05));
  return 0;
}
function boxZ(t){               // 貨物推車位置（z<0 門廳側 → z>0 車廂內）
  if (t < 1.0)  return -1.5;
  if (t < 2.15) return -1.5 + 1.35*eio(seg(t,1.0,2.15));
  if (t < 4.6)  return -0.15;
  if (t < 6.2)  return -0.15 + 1.25*eio(seg(t,4.6,6.2));
  return 1.1;
}
const curtainBlocked = t => Math.abs(boxZ(t)) < 0.27 && dOf(t) > 0.12;
const sig = t => ({
  curtain : !curtainBlocked(t),
  openLim : dOf(t) > 0.995,
  closeLim: dOf(t) < 0.005 && t > 12.5,
  vane    : vaneClamp(t) > 0.5,
  lock    : t >= 14.15,
  safety  : t >= 14.6,
});

/* ============================================================
   步驟定義：判定 → 控制 → 機構 → 下一步條件
   ============================================================ */
const STEPS = [
{t0:0, t1:2.15, no:'S0', short:'關門中', title:'S0 關門中',
 trig:'收到關門指令，馬達開始轉。',
 mech:'馬達轉 → 同步皮帶跑 → 皮帶夾各拉一扇門（左門夾下排、右門夾上排，所以永遠等速對開對關）→ 滑輪沿導軌滑行 → 門刀夾著廳門滾輪，把廳門一起帶著關。',
 next:'光幕被擋 → S1 重開門；沒擋 → 直接到 S7。',
 focus:['beams','motor','belt']},
{t0:2.15, t1:3.0, no:'S1', short:'光幕遮斷', title:'S1 光幕遮斷',
 trig:'貨物擋住任一束紅外線 → 光幕訊號斷（光束變紅）。',
 mech:'皮帶先煞停、再反轉——不是瞬間反彈，避免機構衝擊。',
 next:'反轉開始 → S2。',
 focus:['beams','curtain']},
{t0:3.0, t1:5.0, no:'S2', short:'重開門', title:'S2 重開門',
 trig:'馬達反轉。',
 mech:'兩扇門對開；門刀仍夾著廳門滾輪、廳門跟著開；門鎖勾維持被頂開（解鎖狀態）。',
 next:'門走到全開位置 → S3。',
 focus:['motor','belt','vane']},
{t0:5.0, t1:5.8, no:'S3', short:'開門到位', title:'S3 開門到位',
 trig:'吊門板壓到「開門限位開關」（左上角小開關，燈亮）。',
 mech:'門停在全開，馬達只留一點保持力，防止門被手扒回去。',
 next:'啟動開門等待計時。',
 focus:['openLim']},
{t0:5.8, t1:8.8, no:'S4', short:'等待計時', title:'S4 開門等待',
 trig:'計時倒數；光幕再被擋一次就歸零重數（所以一直有人進出門不會關）。',
 mech:'門保持全開；貨物通過門口進到車廂內。',
 next:'計時到 0 且光幕導通 → S5。',
 focus:['beams','curtain']},
{t0:8.8, t1:9.6, no:'S5', short:'關門啟動', title:'S5 關門啟動',
 trig:'等待條件成立，重新下關門指令。',
 mech:'皮帶低速起步——門剛合攏時最容易夾人，這段全程最慢。',
 next:'起步段走完 → S6。',
 focus:['motor']},
{t0:9.6, t1:12.4, no:'S6', short:'關門行程', title:'S6 關門行程（S 曲線）',
 trig:'編碼器位置決定減速點：離全關剩一小段就提前減速。',
 mech:'加速 → 等速 → 提前減速 → 低速爬行（看右下角速度錶 ▲）；門刀帶著廳門一起關。',
 next:'進入低速爬行 → 等關門限位作動。',
 focus:['belt','motor']},
{t0:12.4, t1:13.6, no:'S7', short:'到位+門刀釋放', title:'S7 關門到位＋門刀釋放',
 trig:'吊門板壓到「關門限位開關」（燈亮）。',
 mech:'門刀兩片刀片向內收攏 → 放開廳門滾輪 → 車門與廳門脫鉤。建議切「門刀／門鎖特寫」鏡頭看。',
 next:'門鎖勾失去支撐 → S8。',
 focus:['vane','closeLim']},
{t0:13.6, t1:14.6, no:'S8', short:'門鎖勾合', title:'S8 門鎖勾合',
 trig:'門刀放開滾輪。',
 mech:'門鎖勾靠彈簧＋自重落下、勾進鎖座銷；勾體上的接點橋同時碰上兩個固定接點 → 門鎖接點導通（綠燈亮）。',
 next:'勾到底＋接點導通 → S9。',
 focus:['hook','contacts']},
{t0:14.6, t1:16.5, no:'S9', short:'鎖閉完成', title:'S9 鎖閉完成',
 trig:'機械勾到底＋電氣接點導通，雙重確認都成立。',
 mech:'廳門被機械鎖死（在外面扒不開）、車門全閉——門機構完成一輪開關門。',
 next:'下一站到站再從開門開始（動畫自動重播）。',
 focus:['contacts','hook']},
];

/* ============================================================
   Three.js 場景
   ============================================================ */
const vp = document.getElementById('viewport');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e1318);
scene.fog = new THREE.Fog(0x0e1318, 7, 16);

const camera = new THREE.PerspectiveCamera(46, 1, 0.05, 50);
camera.position.set(0.4, 1.9, 4.4);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
vp.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.domElement.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none';
vp.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.5, 0);
controls.enableDamping = true; controls.dampingFactor = .08;
controls.maxDistance = 10; controls.minDistance = .5;

scene.add(new THREE.HemisphereLight(0xbfd4e8, 0x2a3440, 1.2));
const key = new THREE.DirectionalLight(0xffffff, 2.2);
key.position.set(3, 5, 4); key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left=-3; key.shadow.camera.right=3;
key.shadow.camera.top=4;  key.shadow.camera.bottom=-1;
scene.add(key);
const fill = new THREE.DirectionalLight(0x88bbff, 0.8);
fill.position.set(-3, 3, -3); scene.add(fill);
const pFront = new THREE.PointLight(0xfff2dd, 22, 7); pFront.position.set(0, 2.5, 1.8); scene.add(pFront);
const pHall  = new THREE.PointLight(0xcfe2ff, 14, 6); pHall.position.set(-0.3, 2.3, -1.4); scene.add(pHall);

/* ---- 材質 ---- */
const M = {
  steel  : new THREE.MeshStandardMaterial({color:0xa8b5c2, metalness:.7, roughness:.38}),
  dark   : new THREE.MeshStandardMaterial({color:0x4d5a68, metalness:.55, roughness:.5}),
  frame  : new THREE.MeshStandardMaterial({color:0x2e3a47, metalness:.4,  roughness:.7}),
  motor  : new THREE.MeshStandardMaterial({color:0x3f6f9e, metalness:.55, roughness:.42}),
  belt   : new THREE.MeshStandardMaterial({color:0x14181c, roughness:.92}),
  tooth  : new THREE.MeshStandardMaterial({color:0x4d5860, roughness:.8}),
  pulley : new THREE.MeshStandardMaterial({color:0xc8d2dc, metalness:.85, roughness:.3}),
  roller : new THREE.MeshStandardMaterial({color:0xe8eef4, metalness:.2,  roughness:.45}),
  panel  : new THREE.MeshPhysicalMaterial({color:0xb9c4cf, metalness:.85, roughness:.3, transparent:true, opacity:.34}),
  landing: new THREE.MeshPhysicalMaterial({color:0x8d99a6, metalness:.85, roughness:.35, transparent:true, opacity:.30}),
  plateX : new THREE.MeshStandardMaterial({color:0x4d5a68, metalness:.55, roughness:.5, transparent:true, opacity:.30}),
  hangerX: new THREE.MeshStandardMaterial({color:0xa8b5c2, metalness:.7, roughness:.38, transparent:true, opacity:.38}),
  vane   : new THREE.MeshStandardMaterial({color:0xffb02e, metalness:.6,  roughness:.4}),
  hook   : new THREE.MeshStandardMaterial({color:0xd64545, metalness:.6,  roughness:.4}),
  copper : new THREE.MeshStandardMaterial({color:0xd98a3a, metalness:.9,  roughness:.3}),
  sw     : new THREE.MeshStandardMaterial({color:0x2f8f5b, metalness:.4,  roughness:.6}),
  sill   : new THREE.MeshStandardMaterial({color:0x6b7682, metalness:.7,  roughness:.45}),
  floorH : new THREE.MeshStandardMaterial({color:0x232b33, roughness:.95}),
  floorC : new THREE.MeshStandardMaterial({color:0x2c3640, roughness:.9}),
  box    : new THREE.MeshStandardMaterial({color:0xcf7a30, roughness:.8}),
  curtain: new THREE.MeshStandardMaterial({color:0x10151a, roughness:.6, emissive:0x07301c, emissiveIntensity:.6}),
};
const B = (w,h,d,m)=>{const x=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);x.castShadow=x.receiveShadow=true;return x};
const CYL=(r,len,m,seg=28)=>{const g=new THREE.CylinderGeometry(r,r,len,seg);g.rotateX(Math.PI/2);
  const x=new THREE.Mesh(g,m);x.castShadow=x.receiveShadow=true;return x};

const labels = [];
function addLabel(target, text, dy=0, dx=0, dz=0){
  const div = document.createElement('div'); div.className='lbl'; div.textContent=text;
  const o = new CSS2DObject(div); o.position.set(dx,dy,dz); target.add(o); labels.push(o); return o;
}

/* ---- 地板、台架 ---- */
const hallF = B(4.6, .04, 1.9, M.floorH); hallF.position.set(0,-.02,-1.30); scene.add(hallF);
const carF  = B(4.6, .04, 1.9, M.floorC); carF.position.set(0,-.02, 1.13); scene.add(carF);
addLabel(hallF,'門廳側（樓層）', .06, -1.6, -.3);
addLabel(carF, '車廂內', .06, -1.6, .4);
for (const sx of [-1.32, 1.32]){
  const col = B(.07, 2.75, .07, M.frame); col.position.set(sx, 1.375, .14); scene.add(col);
}
const topBeam = B(2.71, .07, .07, M.frame); topBeam.position.set(0, 2.72, .14); scene.add(topBeam);

/* ---- 地坎（車門＋廳門各一）---- */

/* 速度曲線小圖 */
const spCv=document.getElementById('speedCv'), spCtx=spCv.getContext('2d');
const SAMPLES=[]; {
  let vmax=0;
  for(let i=0;i<=330;i++){ const t=i/330*T_TOTAL;
    const v=Math.abs(dOf(t+.016)-dOf(t-.016))/.032; SAMPLES.push(v); vmax=Math.max(vmax,v); }
  for(let i=0;i<SAMPLES.length;i++) SAMPLES[i]/=vmax;
}
function drawSpeed(t){
  const w=spCv.width,h=spCv.height;
  spCtx.clearRect(0,0,w,h);
  spCtx.strokeStyle='#2a3645'; spCtx.beginPath(); spCtx.moveTo(0,h-8); spCtx.lineTo(w,h-8); spCtx.stroke();
  spCtx.strokeStyle='#39c5ff'; spCtx.lineWidth=1.5; spCtx.beginPath();
  SAMPLES.forEach((v,i)=>{ const x=i/(SAMPLES.length-1)*w, y=h-8-v*(h-16);
    i?spCtx.lineTo(x,y):spCtx.moveTo(x,y); });
  spCtx.stroke();
  const cx=t/T_TOTAL*w;
  spCtx.fillStyle='#ffb02e'; spCtx.beginPath();
  spCtx.moveTo(cx,h-2); spCtx.lineTo(cx-4,h+4-2); spCtx.lineTo(cx+4,h+4-2); spCtx.closePath(); spCtx.fill();
  spCtx.fillRect(cx-.75,8,1.5,h-16);
}

function update(){
  const t=T;
  const d=dOf(t), clamp=vaneClamp(t), hOpen=hookOpen(t);
  const xl=-(PANEL_W/2)-TRAVEL*d, xr=(PANEL_W/2)+TRAVEL*d;

  hL.g.position.x=xl; hR.g.position.x=xr;
  lL.g.position.x=xl; lR.g.position.x=xr;

  // 皮帶與滑輪
  const beltDisp=TRAVEL*d;
  const wrap=((beltDisp%PITCH)+PITCH)%PITCH;
  teethUp.position.x= wrap; teethDn.position.x=-wrap;
  drivePul.rotation.z=idlePul.rotation.z=-beltDisp/.06;
  encoder.rotation.z=-beltDisp/.06;
  for(const r of hL.rollers) r.rotation.z= (TRAVEL*d)/.048;
  for(const r of hR.rollers) r.rotation.z=-(TRAVEL*d)/.048;
  for(const r of lL.rollers) r.rotation.z= (TRAVEL*d)/.042;
  for(const r of lR.rollers) r.rotation.z=-(TRAVEL*d)/.042;

  // 門刀刀片（夾緊=外擴貼住滾輪）
  bladeL.position.x=-(.024+.008*clamp)-.006;
  bladeR.position.x= (.024+.008*clamp)+.006;
  linkL.rotation.z= .3+.25*(1-clamp);
  linkR.rotation.z=-.3-.25*(1-clamp);

  // 門鎖勾＋接點
  hookG.rotation.z=.62*hOpen;
  const locked = hOpen<.04;
  lockLED.material.emissive.setHex(locked?0x16c95e:0x000000);
  lockLED.material.emissiveIntensity=locked?1.8:0;

  // 限位開關（被吊門板壓到時撥桿倒下）
  swOpen.lever.rotation.z = d>.985 ? -1.1*seg(d,.985,1) : 0;
  swClose.lever.rotation.z= d<.03  ?  1.1*(1-seg(d,0,.03)) : 0;

  // 光幕光束
  const blocked=curtainBlocked(t);
  const gapL=xl+PANEL_W/2-.015, gapR=xr-PANEL_W/2+.015;
  const showBeams=(gapR-gapL)>.07;
  beams.visible=showBeams;
  if(showBeams){
    const pos=beamGeo.attributes.position.array;
    for(let i=0;i<NBEAM;i++){
      const y=.18+i*(1.72/(NBEAM-1));
      pos[i*6+0]=gapL; pos[i*6+1]=y; pos[i*6+2]=.03;
      pos[i*6+3]=gapR; pos[i*6+4]=y; pos[i*6+5]=.03;
    }
    beamGeo.attributes.position.needsUpdate=true;
    beamMat.color.setHex(blocked?0xff5252:0x37d67a);
    beamMat.opacity=blocked?1:.55;
  }
  M.curtain.emissive.setHex(blocked?0x551111:0x07301c);

  // 推車
  cart.position.set(0,0,boxZ(t));

  // ---- HUD ----
  const S=sig(t);
  ui.sigs.curtain.className = 'sig '+(S.curtain?'on':'bad');
  ui.sigs.curtain.innerHTML = `<i></i>光幕${S.curtain?'導通':'遮斷！'}`;
  ui.sigs.openLim.className = 'sig '+(S.openLim?'on':'');
  ui.sigs.closeLim.className= 'sig '+(S.closeLim?'on':'');
  ui.sigs.vane.className    = 'sig '+(S.vane?'warn':'on');
  ui.sigs.vane.innerHTML    = `<i></i>${S.vane?'門刀夾持中（車廳門連動）':'門刀已釋放'}`;
  ui.sigs.lock.className    = 'sig '+(S.lock?'on':'');

  // 等待計時 chip
  if(t>=5.8&&t<8.8){ ui.timer.style.display='block'; ui.timerV.textContent=(8.8-t).toFixed(1)+' s'; }
  else ui.timer.style.display='none';
  ui.banner.classList.toggle('show', t>=15.0);

  // 步驟切換
  const si=stepOf(t);
  if(si!==curStep){
    curStep=si; const s=STEPS[si];
    ui.chipNo.textContent=`STEP ${si+1} / ${STEPS.length} ・ t=${s.t0.toFixed(1)}s`;
    ui.chipTi.textContent=s.title;
    [...ui.list.children].forEach((b,i)=>b.classList.toggle('act',i===si));
    renderDetail(s); setFocus(s.focus);
  }
  // 呼吸燈
  const pulse=(Math.sin(performance.now()/240)+1)/2;
  for(const m of curFocusMats){ m.emissive.setHex(0x1a6fa0); m.emissiveIntensity=.25+.75*pulse; }

  drawSpeed(t);
}

let flashT=0;
function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),.1);
  if(playing){
    T+=dt*SPEEDS[speedIdx];
    if(T>=T_TOTAL){ T=0; forceStep(); flashT=.5; }
  }
  if(flashT>0){ flashT-=dt; ui.flash.style.opacity=Math.min(.8,flashT*2); }
  update();
  controls.update();
  renderer.render(scene,camera);
  labelRenderer.render(scene,camera);
}
renderDetail(STEPS[0]);
loop();

/* 測試掛勾 */
window.__setT=v=>{T=v;forceStep();update();};
window.__pause=()=>{playing=false;ui.play.textContent='▶ 播放';};
window.__state=()=>({T,d:dOf(T),step:stepOf(T),sig:sig(T)});
window.__setCam=(p,t)=>{camera.position.set(...p);controls.target.set(...t);};
window.__world=o=>{const v=new THREE.Vector3();({hook:hookBar,keeper,bridge,pin1:cPin1,blade:bladeL,roller:cR1}[o]).getWorldPosition(v);return v.toArray();};
</script>
