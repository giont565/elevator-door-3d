<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>羽瓣・驅動輪・門・聯軸器 — 兩態標注+模擬</title>
<style>
 :root{--navy:#2C3E48;--gold:#C8A064;--cream:#F5F1E8;--ink:#333;--line:#d8d2c4;--pin:#e23b3b;--arrow:#16a34a;}
 *{box-sizing:border-box;margin:0;padding:0;}
 body{font-family:"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;background:var(--cream);color:var(--ink);}
 header{background:var(--navy);color:#fff;padding:9px 15px;border-bottom:4px solid var(--gold);}
 header h1{font-size:16px;} header p{font-size:11.5px;color:#cfd6db;margin-top:3px;line-height:1.5;}
 .wrap{display:flex;height:calc(100vh - 58px);}
 .photobar{width:150px;flex:none;background:#222;overflow-y:auto;padding:7px 6px;}
 .photobar .pbh{color:#fff;font-size:11.5px;font-weight:700;margin-bottom:6px;line-height:1.4;}
 .thumb{margin-bottom:6px;border:2px solid transparent;border-radius:6px;overflow:hidden;cursor:pointer;background:#333;}
 .thumb.sel{border-color:var(--gold);} .thumb img{width:100%;display:block;} .thumb span{display:block;color:#cfd6db;font-size:9.5px;padding:2px 3px;line-height:1.3;}
 .left{flex:1;display:flex;flex-direction:column;min-width:0;}
 .toolbar{display:flex;flex-wrap:wrap;gap:5px;padding:8px 11px;background:#fff;border-bottom:1px solid var(--line);align-items:center;}
 .toolbar button{font:600 12.5px inherit;padding:6px 10px;border:1.5px solid var(--line);background:#fff;border-radius:7px;cursor:pointer;color:var(--navy);}
 .toolbar button.on{background:var(--navy);color:#fff;border-color:var(--navy);}
 #btnBg.on{background:#2E86DE;border-color:#2E86DE;} #btnSim.on{background:#c0392b;border-color:#c0392b;color:#fff;}
 .stateseg{display:flex;border:1.5px solid var(--gold);border-radius:7px;overflow:hidden;}
 .stateseg button{border:none;border-radius:0;padding:6px 12px;background:#fff;color:var(--navy);}
 .stateseg button.on{background:var(--gold);color:#3a2c10;}
 .toolbar .sep{width:1px;height:20px;background:var(--line);margin:0 3px;}
 .toolbar .hint{font-size:12px;color:#1a7a3a;margin-left:auto;font-weight:600;}
 .stage{flex:1;overflow:hidden;background:#fbfaf6;display:flex;align-items:center;justify-content:center;position:relative;}
 svg{display:block;background:#fff;border:1px solid #eee;max-width:100%;max-height:100%;}
 .part .shape{cursor:move;} .part text{font-size:12px;font-weight:700;fill:var(--navy);paint-order:stroke;stroke:#fff;stroke-width:3;pointer-events:none;user-select:none;}
 .part.sel .shape{stroke:#ff7a00 !important;stroke-width:3 !important;}
 .handle{fill:#ff7a00;stroke:#fff;stroke-width:1.5;cursor:nwse-resize;} .handle[data-h="rot"]{fill:#16a34a;cursor:grab;}
 .right{width:300px;flex:none;background:#fff;border-left:1px solid var(--line);display:flex;flex-direction:column;}
 .right h2{font-size:13px;padding:9px 12px;background:#f0ece2;color:var(--navy);border-bottom:1px solid var(--line);}
 .numbox{padding:9px 12px;border-bottom:1px solid var(--line);font-size:12px;}
 .numbox .nm{font-weight:700;color:var(--navy);margin-bottom:6px;}
 .numbox label{display:inline-flex;align-items:center;gap:3px;margin:2px 6px 2px 0;color:#555;}
 .numbox input{width:54px;padding:3px 4px;border:1px solid var(--line);border-radius:4px;font:12px monospace;}
 .opacrow{padding:6px 12px;border-bottom:1px solid var(--line);font-size:11.5px;color:#555;display:flex;align-items:center;gap:6px;} .opacrow input{flex:1;}
 .marklist{flex:1;overflow:auto;padding:7px 10px;}
 .mk{font-size:11.5px;padding:6px 8px;border-radius:6px;margin-bottom:5px;border-left:4px solid #ccc;background:#faf8f3;display:flex;gap:5px;}
 .mk.pin{border-left-color:var(--pin);} .mk.arrow{border-left-color:var(--arrow);} .mk .x{margin-left:auto;color:#c00;cursor:pointer;font-weight:700;} .mk b{color:var(--navy);}
 .export{padding:9px 11px;border-top:1px solid var(--line);}
 .export textarea{width:100%;height:90px;font:10.5px monospace;border:1px solid var(--line);border-radius:6px;padding:5px;}
 .export button{width:100%;margin-top:5px;padding:9px;background:var(--gold);color:#3a2c10;font-weight:700;border:none;border-radius:8px;cursor:pointer;font-size:13px;}
</style></head><body>
<header><h1>🛗 羽瓣・驅動輪・門・聯軸器 — 兩態標注＋模擬</h1>
<p>① 左邊挑真機照當底圖 ② 切<b>關門態/開門態</b>各自把零件拖/縮放/旋轉對齊照片(大小兩態共用) ③ 按<b>▶模擬</b>看開關門 ④ 導出貼回。滾輪縮放畫面、右側可打數字改大小</p></header>
<div class="wrap">
 <div class="photobar"><div class="pbh">📷 點選當底圖<br>(再點取消)</div><div id="thumbs"></div></div>
 <div class="left">
  <div class="toolbar">
   <div class="stateseg"><button id="stClose" class="on">🚪 關門態</button><button id="stOpen">🚪 開門態</button></div>
   <button id="btnSim">▶ 模擬開關門</button>
   <div class="sep"></div>
   <button id="tMove" class="on">🖱 移動/大小/旋轉</button><button id="tPin">📌 固定點</button><button id="tArrow">➡ 運動方向</button>
   <div class="sep"></div>
   <button id="zin">🔍＋</button><button id="zout">🔍－</button><button id="zrst">⟲視圖</button>
   <button id="btnBg">🖼 底圖</button>
   <div class="sep"></div>
   <button id="tUndo">↩</button><button id="tClearMk">🗑標記</button><button id="tReset">⟲零件</button>
   <span class="hint" id="hint">滾輪縮放畫面、拖空白平移；拖零件對齊照片</span>
  </div>
  <div class="stage">
   <svg id="svg" viewBox="0 0 900 640" width="900" height="640">
    <defs><marker id="ah" markerWidth="11" markerHeight="11" refX="7" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#16a34a"/></marker></defs>
    <image id="bg" x="0" y="0" width="900" height="640" opacity="0.5" preserveAspectRatio="xMidYMid meet" style="visibility:hidden"/>
    <g id="parts"></g><g id="marks"></g><g id="handles"></g><g id="ghost"></g>
   </svg>
  </div>
 </div>
 <div class="right"><h2 id="selName">目前選取：（未選）</h2>
  <div class="numbox" id="numbox"><div class="nm">點一個零件可改數值</div></div>
  <div class="opacrow">底圖透明 <input type="range" id="opac" min="10" max="90" value="50"><span id="opacv">50%</span></div>
  <div class="marklist" id="marklist"></div>
  <div class="export"><textarea id="out" readonly placeholder="導出文字會在這…"></textarea><button id="btnExport">📋 導出標注（複製給我）</button></div>
 </div>
</div>

 {id:'rollD',name:'下驅動輪',shape:'circle',r:12,fill:'#e3e3ea',op:.85,close:{cx:490,cy:354},open:{cx:490,cy:354}},
 {id:'coup1',name:'聯軸器1段(接門機機座)',shape:'rect',w:225,h:44,fill:'#cfd6db',op:.8,labelDy:-2,close:{x:157,y:204,rot:8},open:{x:157,y:204,rot:-7}},
 {id:'coup2',name:'聯軸器2段(接動件)',shape:'rect',w:27,h:198,fill:'#aab6bd',op:.8,labelDy:-2,close:{x:369,y:198,rot:-54},open:{x:360,y:182,rot:-38}},
];
let parts=DEF(),sel=null,mode='move',marks=[],drag=null,bgIdx=-1,bgOn=false,curState='close',sim=null;
let view={x:0,y:0,w:900,h:640};
function applyView(){svg.setAttribute('viewBox',view.x+' '+view.y+' '+view.w+' '+view.h);}

// 縮圖
document.getElementById('thumbs').innerHTML=PHOTOS.map((p,i)=>`<div class="thumb" data-i="${i}"><img src="data:image/jpeg;base64,${p.b}"><span>${p.n}</span></div>`).join('');
function refreshThumbs(){document.querySelectorAll('.thumb').forEach(t=>t.classList.toggle('sel',+t.dataset.i===bgIdx&&bgOn));}
document.querySelectorAll('.thumb').forEach(t=>t.onclick=()=>{const i=+t.dataset.i;
 if(bgIdx===i&&bgOn){bgOn=false;bg.style.visibility='hidden';}else{bgIdx=i;bgOn=true;bg.setAttribute('href','data:image/jpeg;base64,'+PHOTOS[i].b);bg.style.visibility='visible';}
 document.getElementById('btnBg').classList.toggle('on',bgOn);refreshThumbs();});
document.getElementById('btnBg').onclick=()=>{if(bgIdx<0)return;bgOn=!bgOn;bg.style.visibility=bgOn?'visible':'hidden';document.getElementById('btnBg').classList.toggle('on',bgOn);refreshThumbs();};
document.getElementById('opac').oninput=e=>{bg.setAttribute('opacity',e.target.value/100);document.getElementById('opacv').textContent=e.target.value+'%';};

function svgPt(e){const r=svg.getBoundingClientRect();return{x:view.x+(e.clientX-r.left)/r.width*view.w,y:view.y+(e.clientY-r.top)/r.height*view.h};}
function partAt(id){return parts.find(p=>p.id===id);}
function st(p,state){return p[state||curState];}
function centerOf(p,S){const s=st(p,S);return p.shape==='circle'?{x:s.cx,y:s.cy}:{x:s.x+p.w/2,y:s.y+p.h/2};}
function rot2(px,py,cx,cy,deg){const r=deg*Math.PI/180,c=Math.cos(r),s=Math.sin(r),dx=px-cx,dy=py-cy;return{x:cx+dx*c-dy*s,y:cy+dx*s+dy*c};}
function lerp(a,b,t){return a+(b-a)*t;}

// 取某零件在某「插值 t」的繪製資料(模擬用)，t=null 用 curState
function drawData(p,t){
 if(t===null){const s=st(p);return p.shape==='circle'?{cx:s.cx,cy:s.cy}:{x:s.x,y:s.y,rot:s.rot};}
 const c=p.close,o=p.open;
 if(p.shape==='circle')return{cx:lerp(c.cx,o.cx,t),cy:lerp(c.cy,o.cy,t)};
 return{x:lerp(c.x,o.x,t),y:lerp(c.y,o.y,t),rot:lerp(c.rot,o.rot,t)};
}
function render(t){if(t===undefined)t=null;
 partsG.innerHTML=parts.map(p=>{const d=drawData(p,t);let shp,cx,cy;
  if(p.shape==='circle'){cx=d.cx;cy=d.cy;shp=`<circle class="shape" cx="${cx}" cy="${cy}" r="${p.r}" fill="${p.fill}" fill-opacity="${p.op}" stroke="#888" stroke-width="2"/>`;}
  else{cx=d.x+p.w/2;cy=d.y+p.h/2;shp=`<g transform="rotate(${d.rot||0} ${cx} ${cy})"><rect class="shape" x="${d.x}" y="${d.y}" width="${p.w}" height="${p.h}" rx="5" fill="${p.fill}" fill-opacity="${p.op}" stroke="#888" stroke-width="2"/></g>`;}
  const ly=(p.shape==='circle'?cy-p.r-6:d.y-6)+(p.labelDy||0);
  return `<g class="part ${sel===p.id&&t===null?'sel':''}" data-id="${p.id}">${shp}<text x="${cx}" y="${ly}" text-anchor="middle">${p.name}</text></g>`;}).join('');
 // 把手只在非模擬+選中時
 let h='';const p=(t===null&&sel)&&partAt(sel);
 if(p){const s=st(p);if(p.shape==='circle'){h=`<circle class="handle" cx="${s.cx+p.r}" cy="${s.cy}" r="7" data-h="r"/>`;}
  else{const c=centerOf(p),deg=s.rot||0,sc=rot2(s.x+p.w,s.y+p.h,c.x,c.y,deg),rh=rot2(c.x,s.y-26,c.x,c.y,deg);
   h=`<line x1="${c.x}" y1="${c.y}" x2="${rh.x}" y2="${rh.y}" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="3 2"/><rect class="handle" x="${sc.x-7}" y="${sc.y-7}" width="14" height="14" data-h="br"/><circle class="handle" cx="${rh.x}" cy="${rh.y}" r="8" data-h="rot"/>`;}}
 handlesG.innerHTML=h;
 marksG.innerHTML=marks.map((m,i)=>{const n=i+1,dim=(m.state!==curState)?' opacity="0.25"':'';
  if(m.type==='pin')return `<g${dim}><circle cx="${m.x}" cy="${m.y}" r="8" fill="#e23b3b" stroke="#fff" stroke-width="2.5"/><text x="${m.x+11}" y="${m.y-8}" font-size="15" font-weight="800" fill="#e23b3b" stroke="#fff" stroke-width="3" paint-order="stroke">${n}</text></g>`;
  return `<g${dim}><line x1="${m.x1}" y1="${m.y1}" x2="${m.x2}" y2="${m.y2}" stroke="#16a34a" stroke-width="4.5" marker-end="url(#ah)"/><text x="${m.x2+5}" y="${m.y2}" font-size="15" font-weight="800" fill="#0c8a3a" stroke="#fff" stroke-width="3" paint-order="stroke">${n}</text></g>`;}).join('');
 if(t===null)renderPanel();
}
function renderPanel(){const p=sel&&partAt(sel);
 document.getElementById('selName').textContent='目前選取：'+(p?p.name:'（未選）')+'　〔'+(curState==='close'?'關門態':'開門態')+'〕';
 const nb=document.getElementById('numbox');
 if(!p){nb.innerHTML='<div class="nm">點一個零件可改數值</div>';}
 else{const s=st(p);
  if(p.shape==='circle')nb.innerHTML=`<div class="nm">${p.name}</div><label>半徑<input id="i_r" value="${p.r|0}"></label><label>圓心X<input id="i_cx" value="${s.cx|0}"></label><label>圓心Y<input id="i_cy" value="${s.cy|0}"></label><div style="color:#999;font-size:11px;margin-top:4px">半徑兩態共用；圓心是〔${curState==='close'?'關':'開'}門態〕</div>`;
  else nb.innerHTML=`<div class="nm">${p.name}</div><label>寬<input id="i_w" value="${p.w|0}"></label><label>高<input id="i_h" value="${p.h|0}"></label><label>角度<input id="i_rot" value="${s.rot|0}"></label><label>X<input id="i_x" value="${s.x|0}"></label><label>Y<input id="i_y" value="${s.y|0}"></label><div style="color:#999;font-size:11px;margin-top:4px">寬高兩態共用；角度/位置是〔${curState==='close'?'關':'開'}門態〕</div>`;
  nb.querySelectorAll('input').forEach(inp=>inp.oninput=()=>{const v=parseFloat(inp.value)||0,k=inp.id.slice(2);
   if(k==='w'||k==='h'||k==='r')p[k]=Math.max(4,v); else st(p)[k]=v; render();});
 }
}
function nearestPart(x,y){let b=null,bd=1e9;for(const p of parts){const c=centerOf(p),d=(c.x-x)**2+(c.y-y)**2;if(d<bd){bd=d;b=p;}}return b;}
function setMode(m){mode=m;['tMove','tPin','tArrow'].forEach(id=>document.getElementById(id).classList.remove('on'));
 ({move:'tMove',pin:'tPin',arrow:'tArrow'})[m]&&document.getElementById(({move:'tMove',pin:'tPin',arrow:'tArrow'})[m]).classList.add('on');
 document.getElementById('hint').textContent=({move:'滾輪縮放畫面、拖空白平移；拖零件對齊照片',pin:'點零件＝放固定點',arrow:'在零件上拖一條＝運動方向'})[m];}
document.getElementById('tMove').onclick=()=>setMode('move');
document.getElementById('tPin').onclick=()=>setMode('pin');
document.getElementById('tArrow').onclick=()=>setMode('arrow');
document.getElementById('tUndo').onclick=()=>{marks.pop();render();};
document.getElementById('tClearMk').onclick=()=>{marks=[];render();};
document.getElementById('tReset').onclick=()=>{if(confirm('零件兩態都復位？(標記保留)')){parts=DEF();sel=null;render();}};
// 態切換
function setState(s){if(sim)return;curState=s;document.getElementById('stClose').classList.toggle('on',s==='close');document.getElementById('stOpen').classList.toggle('on',s==='open');render();}
document.getElementById('stClose').onclick=()=>setState('close');
document.getElementById('stOpen').onclick=()=>setState('open');
// 模擬
document.getElementById('btnSim').onclick=()=>{const b=document.getElementById('btnSim');
 if(sim){cancelAnimationFrame(sim.raf);sim=null;b.classList.remove('on');b.textContent='▶ 模擬開關門';render();return;}
 b.classList.add('on');b.textContent='⏹ 停止模擬';sim={t:0,dir:1};
 const step=()=>{sim.t+=0.012*sim.dir;if(sim.t>=1){sim.t=1;sim.dir=-1;}if(sim.t<=0){sim.t=0;sim.dir=1;}
  render(sim.t);sim.raf=requestAnimationFrame(step);};step();};
// 畫面縮放/平移
svg.addEventListener('wheel',e=>{e.preventDefault();const p=svgPt(e),f=e.deltaY<0?0.85:1.18;
 const nw=Math.min(2000,Math.max(120,view.w*f)),nh=nw/(900/640);
 view.x=p.x-(p.x-view.x)*(nw/view.w);view.y=p.y-(p.y-view.y)*(nh/view.h);view.w=nw;view.h=nh;applyView();},{passive:false});
document.getElementById('zin').onclick=()=>{const f=.8,cx=view.x+view.w/2,cy=view.y+view.h/2;view.w*=f;view.h*=f;view.x=cx-view.w/2;view.y=cy-view.h/2;applyView();};
document.getElementById('zout').onclick=()=>{const f=1.25,cx=view.x+view.w/2,cy=view.y+view.h/2;view.w*=f;view.h*=f;view.x=cx-view.w/2;view.y=cy-view.h/2;applyView();};
document.getElementById('zrst').onclick=()=>{view={x:0,y:0,w:900,h:640};applyView();};

svg.addEventListener('mousedown',e=>{if(sim)return;const p0=svgPt(e),h=e.target.closest('.handle'),g=e.target.closest('.part');
 if(mode==='move'){if(h){const hk=h.dataset.h;drag={kind:hk==='rot'?'rotate':'resize',h:hk,start:p0,orig:JSON.parse(JSON.stringify(partAt(sel))),center:centerOf(partAt(sel))};return;}
  if(g){sel=g.dataset.id;drag={kind:'move',start:p0,orig:JSON.parse(JSON.stringify(st(partAt(sel))))};render();return;}
  drag={kind:'pan',sx:e.clientX,sy:e.clientY,vx:view.x,vy:view.y};sel=null;render();}
 else if(mode==='arrow'){drag={kind:'arrow',x1:p0.x,y1:p0.y};}
 else if(mode==='pin'){if(g){const p=partAt(g.dataset.id);addMark({type:'pin',x:p0.x,y:p0.y,part:p.id,partName:p.name});}}});
svg.addEventListener('mousemove',e=>{if(!drag)return;const p=svgPt(e);
 if(drag.kind==='pan'){const r=svg.getBoundingClientRect();view.x=drag.vx-(e.clientX-drag.sx)/r.width*view.w;view.y=drag.vy-(e.clientY-drag.sy)/r.height*view.h;applyView();return;}
 if(drag.kind==='move'){const d=st(partAt(sel)),o=drag.orig,dx=p.x-drag.start.x,dy=p.y-drag.start.y;
  if(partAt(sel).shape==='circle'){d.cx=o.cx+dx;d.cy=o.cy+dy;}else{d.x=o.x+dx;d.y=o.y+dy;}render();}
 else if(drag.kind==='resize'){const P=partAt(sel),s=st(P);if(P.shape==='circle'){P.r=Math.max(6,Math.hypot(p.x-s.cx,p.y-s.cy));}
  else{const lp=rot2(p.x,p.y,drag.center.x,drag.center.y,-(s.rot||0));P.w=Math.max(8,lp.x-s.x);P.h=Math.max(8,lp.y-s.y);}render();}
 else if(drag.kind==='rotate'){const s=st(partAt(sel)),c=drag.center;let deg=Math.round(Math.atan2(p.y-c.y,p.x-c.x)*180/Math.PI+90);if(deg>180)deg-=360;if(deg<-180)deg+=360;s.rot=deg;render();}
 else if(drag.kind==='arrow'){ghost.innerHTML=`<line x1="${drag.x1}" y1="${drag.y1}" x2="${p.x}" y2="${p.y}" stroke="#16a34a" stroke-width="4" marker-end="url(#ah)" stroke-dasharray="6 4"/>`;}});
svg.addEventListener('mouseup',e=>{if(drag&&drag.kind==='arrow'){const p=svgPt(e);ghost.innerHTML='';if(Math.hypot(p.x-drag.x1,p.y-drag.y1)>14){const np=nearestPart((drag.x1+p.x)/2,(drag.y1+p.y)/2);addMark({type:'arrow',x1:drag.x1,y1:drag.y1,x2:p.x,y2:p.y,part:np.id,partName:np.name});}}drag=null;});
function addMark(m){const tip=m.type==='pin'?'固定點補一句(可空)':'方向補一句(可空)';const note=prompt('【'+m.partName+'·'+(curState==='close'?'關門':'開門')+'】'+tip,'');if(note===null)return;if(note)m.note=note;m.state=curState;marks.push(m);render();}

document.getElementById('btnExport').onclick=()=>{let t='=== 羽瓣・驅動輪・門・聯軸器 兩態標注 ===\n';
 if(bgIdx>=0)t+='底圖：'+PHOTOS[bgIdx].n+'\n';
 t+='\n[零件大小(兩態共用)]\n';
 parts.forEach(p=>{t+=' · '+p.name+'：'+(p.shape==='circle'?`半徑 ${p.r|0}`:`${p.w|0}×${p.h|0}`)+'\n';});
 ['close','open'].forEach(S=>{t+='\n['+(S==='close'?'關門態':'開門態')+' 位置/角度]\n';
  parts.forEach(p=>{const s=p[S];t+=' · '+p.name+'：'+(p.shape==='circle'?`圓心(${s.cx|0},${s.cy|0})`:`位置(${s.x|0},${s.y|0})${s.rot?' 旋轉'+(s.rot|0)+'°':''}`)+'\n';});});
 ['close','open'].forEach(S=>{const ms=marks.filter(m=>m.state===S);if(!ms.length)return;
  t+='\n['+(S==='close'?'關門態':'開門態')+' 標記]\n';
  ms.forEach(m=>{if(m.type==='pin')t+=` · 固定點 ${m.partName} @(${m.x|0},${m.y|0})${m.note?'　※'+m.note:''}\n`;
   else{const dx=m.x2-m.x1,dy=m.y2-m.y1,dir=Math.abs(dx)>Math.abs(dy)?(dx>0?'向右→':'向左←'):(dy>0?'向下↓':'向上↑');t+=` · 運動 ${m.partName} ${dir}${m.note?'　※'+m.note:''}\n`;}});});
 const o=document.getElementById('out');o.value=t;o.select();let ok=false;try{ok=document.execCommand('copy');}catch(e){}
 if(navigator.clipboard)navigator.clipboard.writeText(t).then(()=>{},()=>{});
 alert(ok?'已複製！貼回對話給我。':'已產生文字(下方框)，請手動複製。');};
applyView();render();setMode('move');
</script></body></html>
