<style>
 :root{--navy:#2C3E48;--gold:#C8A064;--cream:#F5F1E8;--ink:#333;--line:#d8d2c4;
   --pin:#e23b3b;--arrow:#16c95e;--rot:#39c5ff;--fix:#c39bff;}
 *{box-sizing:border-box;margin:0;padding:0;}
 body{font-family:"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;background:var(--cream);color:var(--ink);}
 header{background:var(--navy);color:#fff;padding:11px 18px;border-bottom:4px solid var(--gold);}
 header h1{font-size:17px;} header p{font-size:12px;color:#cfd6db;margin-top:3px;line-height:1.5;}
 .wrap{display:flex;height:calc(100vh - 70px);}
 .left{flex:1;display:flex;flex-direction:column;min-width:0;}
 .toolbar{display:flex;flex-wrap:wrap;gap:6px;padding:9px 12px;background:#fff;border-bottom:1px solid var(--line);align-items:center;}
 .toolbar button{font:600 13px inherit;padding:7px 12px;border:1.5px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;color:var(--navy);}
 .toolbar button.on{background:var(--navy);color:#fff;border-color:var(--navy);}
 .toolbar .sep{width:1px;height:22px;background:var(--line);margin:0 3px;}
 .toolbar .hint{font-size:12px;color:#1a7a3a;margin-left:auto;font-weight:600;}
 .stage{flex:1;overflow:auto;background:#222;display:flex;align-items:center;justify-content:center;}
 svg{display:block;max-width:100%;height:auto;}
 .right{width:330px;flex:none;background:#fff;border-left:1px solid var(--line);display:flex;flex-direction:column;}
 .right h2{font-size:13px;padding:10px 13px;background:#f0ece2;color:var(--navy);border-bottom:1px solid var(--line);}
 .marklist{flex:1;overflow:auto;padding:8px 11px;}
 .mk{font-size:12.5px;padding:7px 9px;border-radius:7px;margin-bottom:6px;border-left:4px solid #ccc;background:#faf8f3;display:flex;gap:6px;}
 .mk.pin{border-left-color:var(--pin);} .mk.arrow{border-left-color:var(--arrow);}
 .mk.rot{border-left-color:var(--rot);} .mk.fix{border-left-color:var(--fix);}
 .mk .x{margin-left:auto;color:#c00;cursor:pointer;font-weight:700;padding:0 4px;}
 .mk b{color:var(--navy);}
 .export{padding:10px 11px;border-top:1px solid var(--line);}
 .export textarea{width:100%;height:120px;font:11px monospace;border:1px solid var(--line);border-radius:6px;padding:6px;}
 .export button{width:100%;margin-top:6px;padding:9px;background:var(--gold);color:#3a2c10;font-weight:700;border:none;border-radius:8px;cursor:pointer;font-size:13px;}
 .legend{font-size:11.5px;color:#666;padding:6px 11px;border-top:1px dashed var(--line);line-height:1.8;}
 .legend span{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:3px;}

<div class="right"><h2>已標注（共 <span id="cnt">0</span> 點）</h2>
 <div class="marklist" id="marklist"></div>
 <div class="legend"><span style="background:var(--pin)"></span>固定點　<span style="background:var(--arrow)"></span>移動方向　<span style="background:var(--rot)"></span>繞點旋轉　<span style="background:var(--fix)"></span>文字</div>
 <div class="export"><textarea id="out" readonly placeholder="按下方導出會把文字產生在這…"></textarea>
  <button id="btnExport">📋 導出標注（複製給我）</button></div>
</div></div>
<script>
const svg=document.getElementById('svg'),marksG=document.getElementById('marks'),ghost=document.getElementById('ghost');
let mode=null,marks=[],drag=null;
function setMode(m){mode=m;['tPin','tArrow','tRot','tNote'].forEach(id=>document.getElementById(id).classList.remove('on'));
 const map={pin:'tPin',arrow:'tArrow',rot:'tRot',note:'tNote'};document.getElementById(map[m]).classList.add('on');
 const h={pin:'點圖放固定點/支點',arrow:'按住拖一條＝移動方向',rot:'點一下＝繞此點旋轉',note:'點一下＝在此放純文字說明'};
 document.getElementById('hint').textContent=h[m];}
document.getElementById('tPin').onclick=()=>setMode('pin');
document.getElementById('tArrow').onclick=()=>setMode('arrow');
document.getElementById('tRot').onclick=()=>setMode('rot');
document.getElementById('tNote').onclick=()=>setMode('note');
document.getElementById('tUndo').onclick=()=>{marks.pop();render();};
document.getElementById('tClear').onclick=()=>{if(confirm('清除所有標注？')){marks=[];render();}};
function svgPt(e){const r=svg.getBoundingClientRect(),vb=svg.viewBox.baseVal;
 return{x:(e.clientX-r.left)/r.width*vb.width,y:(e.clientY-r.top)/r.height*vb.height};}
svg.addEventListener('mousedown',e=>{if(mode==='arrow'){const p=svgPt(e);drag={x1:p.x,y1:p.y};}});
svg.addEventListener('mousemove',e=>{if(mode==='arrow'&&drag){const p=svgPt(e);
 ghost.innerHTML='<line x1="'+drag.x1+'" y1="'+drag.y1+'" x2="'+p.x+'" y2="'+p.y+'" stroke="#16c95e" stroke-width="4" marker-end="url(#ah)" stroke-dasharray="6 4"/>';}});
svg.addEventListener('mouseup',e=>{if(mode==='arrow'&&drag){const p=svgPt(e);ghost.innerHTML='';
 if(Math.hypot(p.x-drag.x1,p.y-drag.y1)>14)addMark({type:'arrow',x1:drag.x1,y1:drag.y1,x2:p.x,y2:p.y});drag=null;}});
svg.addEventListener('click',e=>{if(!mode||mode==='arrow')return;const p=svgPt(e);
 if(mode==='pin')addMark({type:'pin',x:p.x,y:p.y});
 if(mode==='rot')addMark({type:'rot',x:p.x,y:p.y});
 if(mode==='note')addMark({type:'fix',x:p.x,y:p.y});});
function addMark(m){const tip=m.type==='arrow'?'這是哪個元件＋往哪動？(例: 上驅動輪 往上提)':
  m.type==='rot'?'哪個元件繞此點轉＋方向？(例: 上驅動輪 順時針)':
  m.type==='pin'?'這是哪個元件的固定點/支點？(例: 下驅動輪 固定)':'打一句說明';
 const note=prompt(tip,'');if(note===null)return;m.note=note||'(未填)';marks.push(m);render();}
function render(){let s='';marks.forEach((m,i)=>{const n=i+1;
 if(m.type==='pin')s+='<g><circle cx="'+m.x+'" cy="'+m.y+'" r="9" fill="#e23b3b" stroke="#fff" stroke-width="2.5"/><text x="'+(m.x+12)+'" y="'+(m.y-9)+'" font-size="15" font-weight="800" fill="#e23b3b" stroke="#fff" stroke-width="3" paint-order="stroke">'+n+'</text></g>';
 if(m.type==='rot')s+='<g><circle cx="'+m.x+'" cy="'+m.y+'" r="13" fill="none" stroke="#39c5ff" stroke-width="3"/><circle cx="'+m.x+'" cy="'+m.y+'" r="3" fill="#39c5ff"/><text x="'+(m.x+16)+'" y="'+(m.y-10)+'" font-size="15" font-weight="800" fill="#1480b8" stroke="#fff" stroke-width="3" paint-order="stroke">'+n+'</text></g>';
 if(m.type==='arrow')s+='<g><line x1="'+m.x1+'" y1="'+m.y1+'" x2="'+m.x2+'" y2="'+m.y2+'" stroke="#16c95e" stroke-width="4.5" marker-end="url(#ah)"/><text x="'+(m.x2+6)+'" y="'+m.y2+'" font-size="15" font-weight="800" fill="#0c8a3a" stroke="#fff" stroke-width="3" paint-order="stroke">'+n+'</text></g>';
 if(m.type==='fix')s+='<g><rect x="'+(m.x-6)+'" y="'+(m.y-6)+'" width="12" height="12" fill="#c39bff" stroke="#fff" stroke-width="2"/><text x="'+(m.x+12)+'" y="'+(m.y-7)+'" font-size="15" font-weight="800" fill="#7a4ad0" stroke="#fff" stroke-width="3" paint-order="stroke">'+n+'</text></g>';});
 marksG.innerHTML=s;
 const TY={pin:'📌固定點',arrow:'➡移動',rot:'🔄旋轉',fix:'📝文字'};
 document.getElementById('cnt').textContent=marks.length;
 document.getElementById('marklist').innerHTML=marks.length?marks.map((m,i)=>
  '<div class="mk '+m.type+'"><div><b>'+(i+1)+'. '+TY[m.type]+'</b><br>'+(m.note||'')+'</div><div class="x" data-i="'+i+'">✕</div></div>').join(''):
  '<div style="color:#aaa;font-size:12.5px;padding:8px">尚無標注。選工具後在圖上點/拖。</div>';
 document.querySelectorAll('.mk .x').forEach(x=>x.onclick=()=>{marks.splice(+x.dataset.i,1);render();});}
document.getElementById('btnExport').onclick=()=>{const TY={pin:'固定點',arrow:'移動方向',rot:'繞點旋轉',fix:'說明'};
 let t='=== 門閉鎖器＋羽瓣 機構標注（現況圖）===\n座標為圖像像素(左上原點, 圖 1200x1000)\n';
 if(!marks.length)t+='(尚無標注)\n';
 marks.forEach((m,i)=>{t+='\n'+(i+1)+'. ['+TY[m.type]+'] ';
  if(m.type==='arrow'){const dx=m.x2-m.x1,dy=m.y2-m.y1,dir=Math.abs(dx)>Math.abs(dy)?(dx>0?'向右→':'向左←'):(dy>0?'向下↓':'向上↑');
   t+='方向'+dir+' ('+(m.x1|0)+','+(m.y1|0)+')→('+(m.x2|0)+','+(m.y2|0)+')';}
  else t+='@('+(m.x|0)+','+(m.y|0)+')';
  t+='\n   '+m.note;});
 const o=document.getElementById('out');o.value=t;o.select();
 let ok=false;try{ok=document.execCommand('copy');}catch(e){}
 if(navigator.clipboard)navigator.clipboard.writeText(t).then(()=>{},()=>{});
 alert(ok?'已複製！貼回對話給我。':'已產生文字(下方框)，請手動全選複製。');};
render();
</script></body></html>
